name: Deploy to VDS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -o /tmp/deadline-bot-test .

  deploy:
    name: Deploy to VDS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          request_pty: true
          command_timeout: 5m
          script: |
            set -e
            cd ~/deadline-tg-bot
            git pull origin main
            /usr/local/go/bin/go build -o deadline-bot-new .
            mv deadline-bot-new deadline-bot
            sudo systemctl restart deadline-bot
            echo "Deploy finished"
            